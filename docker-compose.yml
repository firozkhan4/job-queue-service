
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app

    depends_on:
      - redis

    environment:
      - SMPT_EMAIL=${SMPT_EMAIL}
      - SMPT_EMAIL_PASSWORD=${SMPT_EMAIL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - MAX_RATELIMIT=${MAX_RATELIMIT}
      - PORT=8080

    ports:
      - "8080:8080"

    networks:
      - jqs


  redis:
    image: redis:latest
    container_name: redis

    ports:
      - "6379:6379"

    networks:
      - jqs


networks:
  jqs:
    driver: bridge
